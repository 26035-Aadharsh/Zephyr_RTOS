# Configure a GPIO
CONFIG_GPIO=y
CONFIG_I2C=y
# Enable BT for Bluetooth Communication
CONFIG_BT=y
CONFIG_BT_HCI=y
CONFIG_BT_PERIPHERAL=y
# Enable BT Services for Bluetooth's BAS Communication
CONFIG_BT_BAS=y
# Enable Sensor : Asynchronous API
CONFIG_SENSOR=y
CONFIG_SENSOR_ASYNC_API=y
# Configure the ADXL 345 Accelerometer
CONFIG_ADXL345=y

# ****** CONFIGURATION 1 ******* #
# Configure Interrupt CB's to run on Global Thread
# CONFIG_ADXL345_TRIGGER_GLOBAL_THREAD=y

# ****** CONFIGURATION 2 ******* #
# Configure a Thread Stack for TRRIGER on a Seperate Thread
CONFIG_ADXL345_TRIGGER_OWN_THREAD=y
CONFIG_ADXL345_THREAD_PRIORITY=10
CONFIG_ADXL345_THREAD_STACK_SIZE=2048

# Parsed using the `BT_DATA_NAME_COMPLETE` Macro in main code;
CONFIG_BT_DEVICE_NAME="Zephyr Accelerometer ADXL345"
